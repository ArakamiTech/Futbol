spring.application.name=msnotificaciones
server.port=8081

#Kafka
# Servidor Kafka
spring.kafka.bootstrap-servers=localhost:9092

# Consumer
spring.kafka.consumer.group-id=ms-notificaciones
spring.kafka.consumer.auto-offset-reset=earliest

# Deserializadores
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.value.default.type=arakamitech.com.msnotificaciones.domain.model.Notificacion

spring.kafka.properties.spring.json.add.type.headers=false

# Permitir deserializar tus paquetes
spring.kafka.consumer.properties.spring.json.trusted.packages=*

#Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=emailconfiguracion@email.com
spring.mail.password=mykey

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2