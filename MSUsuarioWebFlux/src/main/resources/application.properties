spring.application.name=msusuariowebflux
server.port=8083

#EDNPOINTS
request.mapping.controller.usuariocontroller=/api/msusuariowebflux

#r2dbc
spring.r2dbc.url=r2dbc:mysql://127.0.0.1:3306/futbol?serverZoneId=UTC
spring.r2dbc.username=root
spring.r2dbc.password=admin

# Pool (opcional pero recomendado)
spring.r2dbc.pool.enabled=true
spring.r2dbc.pool.initial-size=5
spring.r2dbc.pool.max-size=20

#REDIS REACTIVO
spring.data.redis.host=localhost
spring.data.redis.port=6379

#TTL
app.cache.ttl=60000

logging.level.org.springframework.data.redis=DEBUG

#Logs
logging.level.org.springframework.r2dbc=DEBUG

#Kafka
spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.properties.spring.json.add.type.headers=false